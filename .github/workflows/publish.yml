name: ci
on:
  push:
    tags:
      # Coarse gate: only vMAJOR.MINOR.PATCH-shaped tags start a deploy at all.
      # (This is GitHub's glob filter syntax, not a regex.) The job re-validates
      # the exact shape below before anything is published.
      - "v[0-9]+.[0-9]+.[0-9]+"
# Least privilege: deployment authenticates to WordPress.org SVN via the SVN_*
# secrets, so the GITHUB_TOKEN only needs read access to check out the code.
permissions:
  contents: read
jobs:
  deploy:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate the tag is vMAJOR.MINOR.PATCH
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' must be vMAJOR.MINOR.PATCH (e.g. v1.27.2)."
            exit 1
          fi
      - name: Derive WordPress.org version from the git tag (strip leading "v")
        run: echo "WPORG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Ensure the readme "Stable tag" matches the release version
        run: |
          stable=$(grep -iE '^Stable tag:' readme.txt | head -n1 \
            | sed -E 's/^[Ss]table [Tt]ag:[[:space:]]*//' | tr -d '[:space:]')
          if [[ "$stable" != "$WPORG_VERSION" ]]; then
            echo "::error::readme.txt 'Stable tag' ($stable) does not match the tag version ($WPORG_VERSION)."
            exit 1
          fi
      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: WordPress Plugin Publish
        # Pinned to a commit SHA (supply-chain hardening); the trailing comment
        # tracks the human-readable version. 2.3.0 is the current @stable.
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # 2.3.0 (stable)
        with:
          generate-zip: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SOURCE_DIR: ./
          SLUG: openporte
          # Git tags are vX.Y.Z, but the WordPress.org SVN tag and the readme
          # "Stable tag" use X.Y.Z (no leading "v"). Override the version the
          # action would otherwise derive from the tag name so they match.
          VERSION: ${{ env.WPORG_VERSION }}
