name: ci
on:
  push:
    tags:
    - "*"
# Least privilege: deployment authenticates to WordPress.org SVN via the SVN_*
# secrets, so the GITHUB_TOKEN only needs read access to check out the code.
permissions:
  contents: read
jobs:
  deploy:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Derive WordPress.org version from the git tag (strip leading "v")
        run: echo "WPORG_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: WordPress Plugin Publish
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SOURCE_DIR: ./
          SLUG: openporte
          # Git tags are vX.Y.Z, but the WordPress.org SVN tag and the readme
          # "Stable tag" use X.Y.Z (no leading "v"). Override the version the
          # action would otherwise derive from the tag name so they match.
          VERSION: ${{ env.WPORG_VERSION }}
